<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tarjeta de cumpleaños interactiva con Cinnamoroll, efecto de confeti y diseño azul claro.">
  <title>Cumple 💙</title>

  <style>
    :root {
      --bg-start: #cfeaff;
      --bg-mid: #e8f5ff;
      --bg-end: #fbfdff;
      --text-color: #1f3b60;
      --card-color: #ffffff;
      --accent: #ff92c2;
      --cinn-blue: #d9edff;
      --cinn-blue-deep: #b8dcff;
      --shadow: rgba(15, 35, 80, 0.16);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text-color);
      background: radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.9), transparent 40%),
                  linear-gradient(180deg, var(--bg-start) 0%, var(--bg-mid) 55%, var(--bg-end) 100%);
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 24px 0 12px;
    }

    .sun {
      position: absolute;
      top: -60px;
      right: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 244, 200, 0.9), rgba(255, 244, 200, 0) 70%);
      filter: blur(2px);
      z-index: 1;
      pointer-events: none;
    }

    .hero-title {
      position: absolute;
      left: 50%;
      top: 10%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 3;
      width: 90%;
    }

    .hero-title h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3.3rem);
      letter-spacing: -0.03em;
      color: #17335c;
    }

    .hero-title p {
      margin: 12px 0 0;
      font-size: 1rem;
      opacity: 0.8;
    }

    .cloud {
      position: absolute;
      z-index: 2;
      animation: drift linear infinite;
      pointer-events: none;
    }

    .cloud span {
      position: absolute;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 50%;
      box-shadow: 0 6px 14px rgba(15, 35, 80, 0.06);
    }

    @keyframes drift {
      from { transform: translateX(-280px); }
      to { transform: translateX(120vw); }
    }

    /* 💙 PERSONAJE (imagen real) + botón */
    #cinnamoroll-wrap {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #cinnamoroll {
      width: min(260px, 50vw);
      min-height: 140px;
      cursor: pointer;
      transition: transform 220ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      background: transparent;
      border: none;
      padding: 0;
      touch-action: manipulation;
    }

    #cinnamoroll:hover,
    #cinnamoroll:focus-visible {
      transform: scale(1.04);
    }

    #cinnamoroll img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 18px 28px rgba(15, 35, 80, 0.16));
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(0.6deg); }
    }

    /* Botón visible para tocar / continuar la sorpresa */
    #tap-button {
      position: relative;
      z-index: 16;
      border: none;
      cursor: pointer;
      padding: 12px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7ec4ff, #5fb0ff);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      box-shadow: 0 14px 26px rgba(37, 130, 220, 0.32);
      animation: tapPulse 1.8s ease-in-out infinite;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    #tap-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(37, 130, 220, 0.38);
    }

    #tap-button:active {
      transform: translateY(0) scale(0.97);
    }

    @keyframes tapPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #bubble {
      position: absolute;
      left: 50%;
      bottom: 24%;
      transform: translateX(-50%);
      min-width: 210px;
      max-width: min(90vw, 380px);
      padding: 14px 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 15px 35px rgba(15, 35, 80, 0.14);
      font-size: 0.95rem;
      line-height: 1.5;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease;
      z-index: 12;
    }

    #gift {
      position: absolute;
      left: 50%;
      bottom: 12%;
      transform: translateX(-50%);
      width: 130px;
      height: 130px;
      display: none;
      border-radius: 20px;
      background: linear-gradient(145deg, #ffb5d8, #ff84ba);
      border: 2px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 24px 34px rgba(15, 35, 80, 0.18);
      cursor: pointer;
      z-index: 8;
      overflow: visible;
      animation: giftPulse 1.8s ease-in-out infinite;
    }

    @keyframes giftPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }

    #gift::before,
    #gift::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(255, 255, 255, 0.9);
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    #gift::before {
      width: 22px;
      height: 100%;
    }

    #gift::after {
      width: 100%;
      height: 22px;
    }

    .ribbon-bow {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 34px;
      z-index: 2;
    }

    .ribbon-bow .loop {
      position: absolute;
      top: 0;
      width: 30px;
      height: 28px;
      background: #ffffff;
      border-radius: 60% 60% 60% 5%;
      box-shadow: inset 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    .ribbon-bow .loop.left {
      left: 4px;
      transform: rotate(-18deg);
    }

    .ribbon-bow .loop.right {
      right: 4px;
      transform: rotate(18deg) scaleX(-1);
    }

    .ribbon-bow .knot {
      position: absolute;
      left: 50%;
      top: 6px;
      width: 16px;
      height: 16px;
      background: #ffffff;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: inset 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    #letter {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(88vw, 380px);
      max-height: 82vh;
      padding: 30px 26px 26px;
      border-radius: 24px;
      background: var(--card-color);
      box-shadow: 0 28px 60px rgba(15, 35, 80, 0.16);
      transform: translate(-50%, -50%) scale(0.94);
      opacity: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      z-index: 20;
      overflow: hidden;
      transition: transform 260ms ease, opacity 260ms ease;
    }

    #letter.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #letter::before,
    #letter::after {
      content: "💙";
      position: absolute;
      font-size: 18px;
      opacity: 0.7;
    }

    #letter::before {
      top: 10px;
      left: 14px;
    }

    #letter::after {
      bottom: 10px;
      right: 14px;
    }

    #close-letter {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #eef4ff;
      color: #17335c;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 180ms ease;
    }

    #close-letter:hover {
      background: #dce9ff;
    }

    .letter-header {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #15345f;
      text-align: center;
    }

    .letter-text {
      margin: 0;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 0.95rem;
      color: #2a436f;
      min-height: 140px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--cinn-blue-deep) transparent;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      background: #2a436f;
      margin-left: 1px;
      animation: cursorBlink 0.9s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      opacity: 0.95;
      z-index: 50;
      pointer-events: none;
      animation: confetti-fall 2.4s forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(340px) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 380px) {
      #letter { padding: 26px 18px 20px; }
    }
  </style>
</head>

             onerror="this.replaceWith(Object.assign(document.createElement('div'), {textContent:'💙', style:'font-size:96px;line-height:1;'}))">
      </button>

      <button id="tap-button" type="button">Toca aquí 💙</button>
    </div>

    <aside id="bubble" role="status" aria-live="polite"></aside>

    <button id="gift" aria-label="Abrir regalo sorpresa" type="button">
      <span class="ribbon-bow" aria-hidden="true">
        <span class="loop left"></span>
        <span class="loop right"></span>
        <span class="knot"></span>
      </span>
    </button>

    <article id="letter" aria-labelledby="letter-title" aria-live="off">
      <button id="close-letter" aria-label="Cerrar carta" type="button">✕</button>
      <h2 id="letter-title" class="letter-header">Carta de cumpleaños</h2>
      <div class="letter-text" id="letter-text"></div>
    </article>
  </main>

  <script>
    const page = document.querySelector('.page');
    const cinnamoroll = document.getElementById('cinnamoroll');
    const tapButton = document.getElementById('tap-button');
    const bubble = document.getElementById('bubble');
    const gift = document.getElementById('gift');
    const letter = document.getElementById('letter');
    const letterText = document.getElementById('letter-text');
    const closeLetterBtn = document.getElementById('close-letter');

    const messages = [
      '¡Hola! ☁️💙',
      '¿Eres la persona más especial para Marquilloo? Yo creo que sí...',
      'Él me pidió que cuidara un regalo muy importante hasta que llegara este día.',
      'Me dijo que no podía entregarlo antes porque tenía que esperar el momento perfecto...',
      'Y adivina qué...',
      '¡Ese momento es hoy!',
      'Así que si estás lista, abre este regalito. Dentro hay unas palabras que nacen directamente del corazón de alguien que te ama muchísimo. 💙'
    ];

    let step = 0;
    let typingInterval = null;

    function createCloud() {
      const cloud = document.createElement('div');
      cloud.className = 'cloud';
      const scale = 0.7 + Math.random() * 0.9;
      const w = 140 * scale;
      const h = 60 * scale;
      cloud.style.width = `${w}px`;
      cloud.style.height = `${h}px`;
      cloud.style.top = `${Math.random() * 55}vh`;
      cloud.style.left = `${-w + Math.random() * window.innerWidth}px`;
      cloud.style.animationDuration = `${28 + Math.random() * 20}s`;
      cloud.style.animationDelay = `${-Math.random() * 20}s`;
      cloud.style.opacity = `${0.7 + Math.random() * 0.25}`;

      const puffs = [
        { w: 0.55, h: 0.75, left: 0.05, top: 0.30 },
        { w: 0.65, h: 0.9,  left: 0.30, top: 0.05 },
        { w: 0.5,  h: 0.7,  left: 0.55, top: 0.25 },
        { w: 0.4,  h: 0.55, left: 0.72, top: 0.40 }
      ];

      puffs.forEach(p => {
        const span = document.createElement('span');
        span.style.width = `${w * p.w}px`;
        span.style.height = `${h * p.h}px`;
        span.style.left = `${w * p.left}px`;
        span.style.top = `${h * p.top}px`;
        cloud.appendChild(span);
      });

      page.appendChild(cloud);
    }

    Array.from({ length: 7 }).forEach(createCloud);

    let bubbleHideTimer = null;

    function showBubble(text) {
      if (bubbleHideTimer) clearTimeout(bubbleHideTimer);
      bubble.textContent = text;
      bubble.style.opacity = '1';
      const readTime = Math.min(9000, Math.max(3200, text.length * 70));
      bubbleHideTimer = setTimeout(() => { bubble.style.opacity = '0'; }, readTime);
    }

    function openGift() {
      gift.style.display = 'block';
      gift.animate([
        { transform: 'translateX(-50%) scale(0.8)', opacity: 0 },
        { transform: 'translateX(-50%) scale(1)', opacity: 1 }
      ], { duration: 320, easing: 'ease-out' });
    }

    function showLetter() {
      letter.classList.add('visible');
      letterText.innerHTML = '';
      const message = `Feliz cumpleaños, mi amor. 🎂🤍\n\nHoy no solo celebramos un año más de tu vida; celebramos la existencia de una persona que ha cambiado la mía para bien. Desde que llegaste, descubrí que la felicidad muchas veces tiene tu sonrisa, tu voz y la forma en la que haces que incluso los días más simples se sientan especiales.
      \n\nQuiero agradecerte por cada momento que hemos compartido, por cada risa, cada abrazo y cada recuerdo que hemos construido juntos. Eres alguien que admiro profundamente, y cada día encuentro una razón nueva para enamorarme un poquito más de ti.
      \n\nDeseo que este nuevo año de vida te regale muchas sonrisas, salud, tranquilidad y la fuerza para cumplir todos esos sueños que tanto anhelas. Yo estaré feliz de acompañarte, apoyarte y celebrar cada uno de tus logros.
      \n\nSi alguna vez dudas de lo mucho que significas para mí, vuelve a leer estas palabras y recuerda que hay alguien que piensa en ti con cariño, que se siente orgulloso de ti y que agradece infinitamente que formes parte de su vida.
      \n\nHoy quiero que disfrutes cada instante y que nunca dejes de sonreír, porque tu sonrisa tiene un poder increíble: hace que mi mundo sea un lugar mucho más bonito.
      \n\nGracias por existir. Gracias por ser tú.
      \n\nFeliz cumpleaños, mi princesa. 🤍🎂
      \n\nTe amo con todo mi corazón.
      \n\nCon muchísimo amor,
      \nEl biejo pelon 💙`;
      typeText(message, letterText);
      launchConfetti(50);
    }

    function typeText(text, element) {
      let index = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor-blink';
      cursor.textContent = ' ';

      // Escribe varios caracteres por tick para que mensajes largos
      // se lean en un tiempo razonable, sin perder el efecto de máquina de escribir.
      const charsPerTick = Math.max(1, Math.round(text.length / 220));

      if (typingInterval) clearInterval(typingInterval);

      typingInterval = setInterval(() => {
        cursor.remove();
        index = Math.min(text.length, index + charsPerTick);
        element.textContent = text.slice(0, index);
        element.appendChild(cursor);
        element.scrollTop = element.scrollHeight;
        if (index >= text.length) {
          clearInterval(typingInterval);
        }
      }, 18);
    }

    function launchConfetti(count) {
      const colors = ['#ff5d9e', '#f7d15a', '#65c5ff', '#8fecc1', '#d48cff'];
      for (let i = 0; i < count; i += 1) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = `${Math.random() * 100}vw`;
        confetti.style.top = `${Math.random() * 25}vh`;
        confetti.style.width = `${6 + Math.random() * 6}px`;
        confetti.style.height = `${6 + Math.random() * 6}px`;
        confetti.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
        confetti.style.animationDuration = `${1.8 + Math.random() * 1}s`;
        confetti.style.animationDelay = `${Math.random() * 0.3}s`;
        page.appendChild(confetti);
        confetti.addEventListener('animationend', () => confetti.remove());
      }
    }

    function handleTapAction() {
      if (step < messages.length) {
        showBubble(messages[step]);

        [cinnamoroll, tapButton].forEach(el => {
          el.style.transform = 'scale(1.08)';
          setTimeout(() => { el.style.transform = 'scale(1)'; }, 220);
        });
      }

      step += 1;
      if (step === messages.length) {
        tapButton.style.display = 'none';
        setTimeout(openGift, 700);
      }
    }

    cinnamoroll.addEventListener('click', handleTapAction);
    tapButton.addEventListener('click', handleTapAction);

    gift.addEventListener('click', () => {
      gift.style.display = 'none';
      showLetter();
    });

    closeLetterBtn.addEventListener('click', () => {
      letter.classList.remove('visible');
      if (typingInterval) clearInterval(typingInterval);
    });
  </script>
</body>
</html>
